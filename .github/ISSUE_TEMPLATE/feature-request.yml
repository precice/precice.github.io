name: Feature request
description: Suggest a new feature or improvement for the preCICE website
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to suggest an improvement! Please fill in as much detail as you can.
  - type: textarea
    id: problem
    attributes:
      label: What task are you unable to perform because this feature is missing?
      description: Describe the task or workflow that is currently not possible or too difficult.
      placeholder: _Your response here_
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution or feature you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: _Your response here_
    validations:
      required: true
  - type: textarea
    id: feedback
    attributes:
      label: Any other feedback
      description: Feel free to share anything else — screenshots, links, or ideas.
      placeholder: _Please feel free to share anything. The stage is all yours._
